
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chomikuj Link Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #6a0dad, #1e1e2f);
      color: #ffffff;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    .btn-primary {
      background-color: #8e44ad;
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 0.8rem;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    .btn-primary:hover {
      background-color: #a64dbf;
    }
    h1 {
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    label {
      font-weight: bold;
    }
    .result {
      background: #2a2a40;
      border-radius: 5px;
      padding: 1rem;
      margin-top: 1rem;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .result h4 {
      margin-bottom: 0.5rem;
    }
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: #bbbbbb;
    }
    footer a {
      color: #8e44ad;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chomikuj Link Generator</h1>
    <form id="linkForm">
      <div class="mb-3">
        <label for="login" class="form-label">Login:</label>
        <input type="text" class="form-control" id="login" placeholder="Wpisz swój login" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Hasło:</label>
        <input type="password" class="form-control" id="password" placeholder="Wpisz swoje hasło" required>
      </div>
      <div class="mb-3">
        <label for="folderLink" class="form-label">Link do folderu:</label>
        <input type="url" class="form-control" id="folderLink" placeholder="Wklej link do folderu" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Generuj linki</button>
    </form>
    <div id="result" class="result mt-4" style="display: none;">
      <h4>Wygenerowane linki:</h4>
      <pre id="links"></pre>
    </div>
  <script>
    document.getElementById('linkForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const login = document.getElementById('login').value;
      const password = document.getElementById('password').value;
      const folderLink = document.getElementById('folderLink').value;

      try {
        const response = await fetch('https://your-backend-url.com/generate-links', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password, folderLink }),
        });

        const result = await response.json();
        const resultDiv = document.getElementById('result');
        const linksContainer = document.getElementById('links');

        if (response.ok) {
          resultDiv.style.display = 'block';
          linksContainer.textContent = JSON.stringify(result.links, null, 2);
        } else {
          resultDiv.style.display = 'block';
          linksContainer.textContent = `Błąd: ${result.message}`;
        }
      } catch (error) {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        document.getElementById('links').textContent = `Błąd połączenia: ${error.message}`;
      }
    });
  </script>
</body>
</html>
