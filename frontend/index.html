<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generator linków do Chomikuj dla folderów i plików wideo">
  <meta name="author" content="Your Name">
  <title>Chomikuj Link Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #6a0dad, #1e1e2f);
      color: #ffffff;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    .container {
      max-width: 600px;
      padding: 3rem;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    h1 {
      font-size: 2.2rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 1.5rem;
      color: #fff;
    }
    label {
      font-weight: bold;
    }
    .btn-primary {
      background-color: #8e44ad;
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 0.8rem;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    .btn-primary:hover {
      background-color: #a64dbf;
    }
    .btn-secondary {
      background-color: #444;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      padding: 0.8rem;
      border-radius: 5px;
      margin-top: 1rem;
      transition: background-color 0.3s ease;
    }
    .btn-secondary:hover {
      background-color: #555;
    }
    .result {
      background: #2a2a40;
      border-radius: 5px;
      padding: 1rem;
      margin-top: 1rem;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .result h4 {
      margin-bottom: 0.5rem;
    }
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: #bbbbbb;
    }
    footer a {
      color: #8e44ad;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
    .spinner {
      width: 2rem;
      height: 2rem;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .video-thumbnail {
      width: 100%;
      height: auto;
      border-radius: 5px;
      display: block;
      object-fit: cover;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .copy-btn, .jd-btn {
      margin-top: 10px;
      font-size: 1rem;
      padding: 0.5rem 1rem;
      background-color: #3c9ed0;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s ease;
    }
    .copy-btn:hover, .jd-btn:hover {
      background-color: #357abd;
    }
    .copy-btn:active, .jd-btn:active {
      background-color: #2b6692;
    }
    .alert {
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chomikuj Link Generator</h1>
    <form id="linkForm">
      <div class="mb-3">
        <label for="login" class="form-label">Login:</label>
        <input type="text" class="form-control" id="login" placeholder="Wpisz swój login" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Hasło:</label>
        <input type="password" class="form-control" id="password" placeholder="Wpisz swoje hasło" required>
      </div>
      <div class="mb-3">
        <label for="folderLink" class="form-label">Link do folderu:</label>
        <input type="url" class="form-control" id="folderLink" placeholder="Wklej link do folderu" required>
      </div>
      <div class="mb-3">
        <label for="videoLink" class="form-label">Link do pliku wideo:</label>
        <input type="url" class="form-control" id="videoLink" placeholder="Wklej link do pliku wideo (np. mp4, mkv)" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Generuj linki</button>
    </form>

    <!-- Wyniki -->
    <div id="result" class="result mt-4" style="display: none;">
      <h4>Wygenerowane linki:</h4>
      <pre id="links"></pre>
      <h4>Odtwarzacz Wideo:</h4>
      <div id="videoContainer" class="text-center">
        <img id="videoThumbnail" class="video-thumbnail" src="" alt="Miniatura wideo" style="display: none;">
        <video id="videoPlayer" controls style="width: 100%; display: none;">
          <source id="videoSource" src="" type="video/mp4">
          Twoja przeglądarka nie wspiera tagu video.
        </video>
      </div>
      
      <!-- Przycisk kopiowania linków -->
      <button id="copyBtn" class="copy-btn">Kopiuj linki do schowka</button>

      <!-- Przycisk do JDownloader -->
      <button id="jdLinkBtn" class="jd-btn" style="display: none;">Dodaj do JDownloader</button>

      <!-- Komunikat o błędzie -->
      <div id="errorMsg" class="alert alert-danger" style="display: none;"></div>
    </div>
    
    <!-- Spinner -->
    <div id="loadingSpinner" class="text-center" style="display: none;">
      <div class="spinner"></div>
    </div>
  </div>

  <footer>
    <p>Stworzone przez <a href="#">Your Name</a></p>
  </footer>

  <script>
    document.getElementById('linkForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      toggleLoading(true);
      clearError();

      const login = document.getElementById('login').value;
      const password = document.getElementById('password').value;
      const folderLink = document.getElementById('folderLink').value;
      const videoLink = document.getElementById('videoLink').value;

      try {
        const response = await fetch('https://your-api-endpoint.com/generate-links', { 
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password, folderLink })
        });

        const result = await response.json();
        handleApiResponse(result, videoLink, response.ok);
      } catch (error) {
        handleError(error);
      }
    });

    function handleApiResponse(result, videoLink, isSuccess) {
      toggleLoading(false);

      const resultDiv = document.getElementById('result');
      const linksContainer = document.getElementById('links');
      const videoPlayer = document.getElementById('videoPlayer');
      const videoSource = document.getElementById('videoSource');
      const videoThumbnail = document.getElementById('videoThumbnail');
      const copyBtn = document.getElementById('copyBtn');
      const jdLinkBtn = document.getElementById('jdLinkBtn');
      
      if (isSuccess) {
        resultDiv.style.display = 'block';
        linksContainer.textContent = JSON.stringify(result.links, null, 2);

';
        links        // Dodanie linku do JDownloader
        const jdLink = `jdownloader://add-links/${encodeURIComponent(result.links[0])}`;
        jdLinkBtn.style.display = 'block';
        jdLinkBtn.onclick = () => {
          window.location.href = jdLink;
        };

        loadVideo(videoLink, videoPlayer, videoSource, videoThumbnail);

        // Kopiowanie linku do schowka
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(result.links[0])
            .then(() => alert('Link skopiowany do schowka!'))
            .catch(err => showError(`Błąd kopiowania linku: ${err.message}`));
        };
      } else {
        showError(result.message);
      }
    }

    function loadVideo(videoLink, videoPlayer, videoSource, videoThumbnail) {
      videoSource.src = videoLink;
      videoThumbnail.style.display = 'block';
      videoThumbnail.src = `https://img.youtube.com/vi/${videoLink.split('/').pop()}/0.jpg`;

      videoThumbnail.onload = function() {
        videoPlayer.style.display = 'block';
        videoPlayer.load();
      };
    }

    function handleError(error) {
      toggleLoading(false);
      showError(`Błąd połączenia: ${error.message}`);
    }

    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'block';
      errorMsg.textContent = message;
    }

    function clearError() {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';
    }

    function toggleLoading(isLoading) {
      document.getElementById('loadingSpinner').style.display = isLoading ? 'block' : 'none';
    }
  </script>
</body>
</html>
